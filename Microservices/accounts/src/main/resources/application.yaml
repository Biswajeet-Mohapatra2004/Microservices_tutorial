spring:
  application:
    name: accounts
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    h2:
      console:
        enabled: true
        path: /h2-console
      settings:
        web-allow-others: true
    jpa:
      database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

build:
  version: "1.0.0"

